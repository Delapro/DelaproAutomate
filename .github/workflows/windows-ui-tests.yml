name: Windows UI Tests

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hosted-server-ui:
    name: Screenshot / ${{ matrix.os }} / ${{ matrix.engine }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Win2022-PS51
            os: windows-2022
            executable: powershell.exe        
            engine: Windows PowerShell 5.1
          - name: Win2022-PS7
            os: windows-2022
            executable: pwsh.exe
            engine: PowerShell 7
          - name: Win2025-PS51
            os: windows-2025
            executable: powershell.exe
            engine: Windows PowerShell 5.1
          - name: Win2025-PS7
            os: windows-2025
            executable: pwsh.exe
            engine: PowerShell 7

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v6

      - name: Fenster- und Clientaufnahme testen
        shell: pwsh
        run: |
          $PowerShellExecutable = '${{ matrix.executable }}'
          $OutputDirectory = '.\TestResults\${{ matrix.name }}'
          & $PowerShellExecutable -NoLogo -NoProfile -NonInteractive -ExecutionPolicy Bypass -File '.\Tests\Test-ScreenCapture.PS1' -OutputDirectory $OutputDirectory
          If ($LASTEXITCODE -ne 0) {
              Exit $LASTEXITCODE
          }

      - name: Testbilder hochladen
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: screenshots-${{ matrix.name }}          
          path: TestResults
          if-no-files-found: ignore

  self-hosted-client-ui:
    name: Screenshot / Windows-Client / Windows PowerShell 5.1
    if: ${{ vars.DLP_RUN_CLIENT_UI_TESTS == 'true' }}
    runs-on: [self-hosted, windows, x64, dlp-ui-client]

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v6

      - name: Interaktive Sitzung prüfen
        shell: powershell
        run: |
          Write-Host "Session: $env:SESSIONNAME"
          If ([Environment]::UserInteractive -ne $true) {
              throw 'Der Self-hosted Runner läuft nicht in einer interaktiven Benutzersitzung.'
          }

      - name: Fenster- und Clientaufnahme testen
        shell: powershell
        run: '& .\Tests\Test-ScreenCapture.PS1 -OutputDirectory ".\TestResults\windows-client"'

      - name: Testbilder hochladen
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: screenshots-windows-client
          path: TestResults
          if-no-files-found: ignore
