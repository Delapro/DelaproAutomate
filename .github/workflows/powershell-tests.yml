name: PowerShell Tests

on:
  push:
    paths:
      - '**.PS1'
      - 'README.md'
      - '.github/workflows/**'
  pull_request:
    paths:
      - '**.PS1'
      - 'README.md'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    name: ${{ matrix.os }} / ${{ matrix.engine }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Win2022-PS51
            os: windows-2022
            executable: powershell.exe
            engine: Windows PowerShell 5.1
          - name: Win2022-PS7
            os: windows-2022
            executable: pwsh.exe
            engine: PowerShell 7
          - name: Win2025-PS51
            os: windows-2025
            executable: powershell.exe
            engine: Windows PowerShell 5.1
          - name: Win2025-PS7
            os: windows-2025
            executable: pwsh.exe
            engine: PowerShell 7

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v6

      - name: PowerShell-Version anzeigen
        shell: pwsh
        run: |
          $PowerShellExecutable = '${{ matrix.executable }}'
          & $PowerShellExecutable -NoLogo -NoProfile -NonInteractive -Command '$PSVersionTable | Format-List | Out-String | Write-Host'
          If ($LASTEXITCODE -ne 0) {
              Exit $LASTEXITCODE
          }

      - name: Unit- und Ladetests ausführen
        shell: pwsh
        run: |
          $PowerShellExecutable = '${{ matrix.executable }}'
          & $PowerShellExecutable -NoLogo -NoProfile -NonInteractive -ExecutionPolicy Bypass -File '.\Tests\Invoke-UnitTests.PS1'
          If ($LASTEXITCODE -ne 0) {
              Exit $LASTEXITCODE
          }
